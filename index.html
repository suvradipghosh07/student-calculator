<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Student Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet" />
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Nunito', sans-serif;
  background: #fef9f0;
  background-image: radial-gradient(circle, #f0c070 1.5px, transparent 1.5px);
  background-size: 28px 28px;
  padding: 20px;
}

.card {
  width: 360px;
  background: #ffffff;
  border-radius: 28px;
  box-shadow: 0 4px 0 #e0c88a, 0 12px 40px rgba(0,0,0,.12);
  overflow: hidden;
  animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes popIn {
  from { opacity:0; transform:scale(.8) translateY(20px); }
  to   { opacity:1; transform:scale(1)  translateY(0); }
}

.header {
  background: linear-gradient(135deg, #ff6b9d, #ff8c42);
  padding: 14px 20px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-icon  { font-size:26px; animation:wobble 3s ease-in-out infinite; }
@keyframes wobble { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }
.header-title { font-family:'Fredoka One',sans-serif; font-size:20px; color:#fff; letter-spacing:.04em; }
.header-sub   { margin-left:auto; font-size:11px; color:rgba(255,255,255,.75); font-weight:800; letter-spacing:.06em; }

.display {
  background: linear-gradient(160deg, #1e1b4b, #2e265e);
  padding: 18px 20px 16px;
  min-height: 110px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  position: relative;
  overflow: hidden;
}
.display::before {
  content:''; position:absolute; top:-20px; left:-20px;
  width:120px; height:120px;
  background:radial-gradient(circle, rgba(255,107,157,.25), transparent 70%);
  pointer-events:none;
}
.display-label {
  position:absolute; top:10px; left:16px;
  font-size:10px; font-weight:800; letter-spacing:.18em;
  color:rgba(255,255,255,.3); text-transform:uppercase;
}
.expression {
  font-size:13px; color:rgba(255,255,255,.45);
  text-align:right; min-height:18px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-bottom:4px;
}
.result {
  font-family:'Fredoka One',sans-serif;
  font-size:52px; color:#ffffff;
  text-align:right; line-height:1;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  transition:color .2s;
}
.result.solved { color:#7ee8a2; }
.result.error  { color:#ff6b6b; font-size:22px; padding-top:18px; }
.result.pop    { animation:numPop  .15s ease; }
.result.slide  { animation:numSlide .2s cubic-bezier(.16,1,.3,1); }
@keyframes numPop   { 0%{transform:scale(1)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }
@keyframes numSlide { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

.reaction {
  position:absolute; font-size:22px;
  bottom:60px; right:20px;
  opacity:0; pointer-events:none;
  animation:floatUp .8s ease forwards;
}
@keyframes floatUp {
  0%  { opacity:1; transform:translateY(0) scale(1); }
  100%{ opacity:0; transform:translateY(-50px) scale(1.3); }
}

.tape-toggle {
  background:#f7f0ff; border:none; width:100%;
  padding:7px 18px;
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer;
  font-family:'Nunito',sans-serif; font-size:12px; font-weight:800;
  color:#7c3aed; letter-spacing:.06em;
  border-bottom:1px solid #ede9fe;
  transition:background .15s;
}
.tape-toggle:hover { background:#ede9fe; }
.tape-arrow { transition:transform .25s; font-size:14px; }
.tape-arrow.open { transform:rotate(180deg); }
.tape {
  max-height:0; overflow:hidden;
  transition:max-height .3s cubic-bezier(.16,1,.3,1);
  background:#faf7ff;
}
.tape.open { max-height:180px; }
.tape-inner {
  padding:10px 16px; max-height:180px; overflow-y:auto;
  display:flex; flex-direction:column-reverse; gap:4px;
}
.tape-inner::-webkit-scrollbar { width:4px; }
.tape-inner::-webkit-scrollbar-thumb { background:#c4b5fd; border-radius:4px; }
.tape-row {
  font-size:13px; color:#6d6d6d; text-align:right;
  padding:2px 0; border-bottom:1px dashed #e9d5ff;
  animation:fadeRow .3s ease;
}
@keyframes fadeRow { from{opacity:0;transform:translateX(8px)} to{opacity:1;transform:none} }
.tape-row .ans { color:#7c3aed; font-weight:800; }
.tape-empty { font-size:12px; color:#bbb; text-align:center; padding:10px 0; }

.btn-area {
  padding:16px 16px 18px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}
.btn-wrap { opacity:0; animation:btnIn .4s cubic-bezier(.34,1.56,.64,1) both; }
@keyframes btnIn { from{opacity:0;transform:scale(.5)} to{opacity:1;transform:scale(1)} }

button {
  width:100%; height:64px;
  border:none; border-bottom:3px solid rgba(0,0,0,.12);
  border-radius:16px;
  font-family:'Nunito',sans-serif; font-size:18px; font-weight:800;
  cursor:pointer; outline:none;
  position:relative; overflow:hidden;
  transition:transform .1s, filter .1s, border-bottom-width .1s;
  -webkit-tap-highlight-color:transparent;
}
button .ripple {
  position:absolute; border-radius:50%;
  background:rgba(255,255,255,.35);
  transform:scale(0); animation:ripple .45s linear;
  pointer-events:none;
}
@keyframes ripple { to{transform:scale(4.5);opacity:0} }
button:hover  { filter:brightness(1.06); transform:translateY(-1px); }
button:active { transform:translateY(2px) scale(.97); border-bottom-width:1px; }

button.num { background:#f1f5ff; color:#1e1b4b; box-shadow:0 3px 0 #c7d2fe; }
button.num:hover { background:#e8edff; }

button.op { background:#fff3e0; color:#e65100; box-shadow:0 3px 0 #ffcc80; font-size:22px; }
button.op:hover { background:#ffe0b2; }
button.op.lit   { background:#ff8c42; color:#fff; box-shadow:0 3px 0 #c65f00; }

button.eq {
  background:linear-gradient(160deg,#ff6b9d,#ff4081);
  color:#fff; font-size:28px;
  box-shadow:0 3px 0 #c62828; border-bottom:3px solid #c62828;
}
button.eq:hover  { filter:brightness(1.1); }
button.eq:active { box-shadow:none; }

button.clear { background:#fce4ec; color:#c62828; font-size:13px; letter-spacing:.04em; box-shadow:0 3px 0 #ef9a9a; }
button.clear:hover { background:#ffcdd2; }

button.fn { background:#e8f5e9; color:#2e7d32; font-size:15px; box-shadow:0 3px 0 #a5d6a7; }
button.fn:hover { background:#c8e6c9; }

button.wide { grid-column:span 2; }

.tip {
  background:#fff8e1; border-top:1px dashed #ffe082;
  padding:8px 16px; font-size:11px; font-weight:700;
  color:#f57f17; text-align:center; letter-spacing:.04em;
}
.tip span { opacity:.6; }

</style>
</head>
<body>

<div class="card">

  <div class="header">
    <div class="header-icon">🧮</div>
    <div class="header-title">Student Calc</div>
    <div class="header-sub">GRADE A+</div>
  </div>

  <div class="display" id="display">
    <div class="display-label">Answer</div>
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>

  <button class="tape-toggle" id="tapeToggle">
    📋 Calculation History
    <span class="tape-arrow" id="tapeArrow">▾</span>
  </button>
  <div class="tape" id="tape">
    <div class="tape-inner" id="tapeInner">
      <div class="tape-empty" id="tapeEmpty">No calculations yet — go ahead! 🙂</div>
    </div>
  </div>

  <div class="btn-area" id="btnArea">

    <div class="btn-wrap" style="animation-delay:.04s">
      <button class="clear" data-action="clear">AC</button>
    </div>
    <div class="btn-wrap" style="animation-delay:.08s">
      <button class="fn" data-action="sign">+/−</button>
    </div>
    <div class="btn-wrap" style="animation-delay:.12s">
      <button class="fn" data-action="percent">%</button>
    </div>
    <div class="btn-wrap" style="animation-delay:.16s">
      <button class="op" data-action="op" data-val="÷">÷</button>
    </div>

    <div class="btn-wrap" style="animation-delay:.10s">
      <button class="num" data-action="digit" data-val="7">7</button>
    </div>
    <div class="btn-wrap" style="animation-delay:.14s">
      <button class="num" data-action="digit" data-val="8">8</button>
    </div>
    <div class="btn-wrap" style="animation-delay:.18s">
      <button class="num" data-action="digit" data-val="9">9</button>
    </div>
    <div class="btn-wrap" style="animation-delay:.22s">
      <button class="op" data-action="op" data-val="×">×</button>
    </div>

    <div class="btn-wrap" style="animation-delay:.16s">
      <button class="num" data-action="digit" data-val="4">4</button>
    </div>
    <div class="btn-wrap" style="animation-delay:.20s">
      <button class="num" data-action="digit" data-val="5">5</button>
    </div>
    <div class="btn-wrap" style="animation-delay:.24s">
      <button class="num" data-action="digit" data-val="6">6</button>
    </div>
    <div class="btn-wrap" style="animation-delay:.28s">
      <button class="op" data-action="op" data-val="−">−</button>
    </div>

    <div class="btn-wrap" style="animation-delay:.22s">
      <button class="num" data-action="digit" data-val="1">1</button>
    </div>
    <div class="btn-wrap" style="animation-delay:.26s">
      <button class="num" data-action="digit" data-val="2">2</button>
    </div>
    <div class="btn-wrap" style="animation-delay:.30s">
      <button class="num" data-action="digit" data-val="3">3</button>
    </div>
    <div class="btn-wrap" style="animation-delay:.34s">
      <button class="op" data-action="op" data-val="+">+</button>
    </div>

    <div class="btn-wrap" style="animation-delay:.28s;grid-column:span 2">
      <button class="num wide" data-action="digit" data-val="0">0</button>
    </div>
    <div class="btn-wrap" style="animation-delay:.32s">
      <button class="fn" data-action="dot">.</button>
    </div>
    <div class="btn-wrap" style="animation-delay:.36s">
      <button class="fn" data-action="backspace">⌫</button>
    </div>

    <div class="btn-wrap" style="animation-delay:.40s;grid-column:span 4">
      <button class="eq" data-action="equals" style="height:56px">=</button>
    </div>

  </div>

  <div class="tip">⌨️ Keyboard works too! &nbsp;<span>Esc = AC &nbsp;·&nbsp; Backspace = ⌫</span></div>

</div>

<script>
let current    = '0';
let stored     = null;
let operator   = null;
let waiting    = false;
let hasDecimal = false;

const resultEl     = document.getElementById('result');
const expressionEl = document.getElementById('expression');
const displayEl    = document.getElementById('display');
const tapeInner    = document.getElementById('tapeInner');
const tapeEmpty    = document.getElementById('tapeEmpty');

const happyEmojis  = ['🎉','✨','🔥','💯','🌟','👏','😎','🚀','💪','🎊'];
const bigNumEmojis = ['🤯','😲','🔢','📐'];

function fmt(n) {
  if (!isFinite(n)) return 'Error';
  const abs = Math.abs(n);
  if (abs !== 0 && (abs >= 1e13 || abs < 1e-9)) return n.toExponential(4);
  return String(parseFloat(n.toPrecision(12)));
}

function showResult(val, style) {
  resultEl.className = 'result ' + (style || '');
  const len = String(val).length;
  resultEl.style.fontSize =
    len > 14 ? '26px' :
    len > 10 ? '34px' :
    len > 7  ? '42px' : '52px';
  resultEl.textContent = val;
}

function showExpression(val) {
  expressionEl.textContent = val;
}

function animPop() {
  resultEl.classList.remove('pop', 'slide');
  void resultEl.offsetWidth;
  resultEl.classList.add('pop');
}

function animSlide() {
  resultEl.classList.remove('pop', 'slide');
  void resultEl.offsetWidth;
  resultEl.classList.add('slide');
}

function showReaction(isBigNumber) {
  const pool  = isBigNumber ? bigNumEmojis : happyEmojis;
  const emoji = pool[Math.floor(Math.random() * pool.length)];
  const el    = document.createElement('div');
  el.className    = 'reaction';
  el.textContent  = emoji;
  displayEl.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

let litBtn = null;

function lightUp(btn) {
  if (litBtn) litBtn.classList.remove('lit');
  litBtn = btn || null;
  if (litBtn) litBtn.classList.add('lit');
}

function addToHistory(expression, answer) {
  tapeEmpty.style.display = 'none';
  const row = document.createElement('div');
  row.className = 'tape-row';
  row.innerHTML = `${expression} = <span class="ans">${answer}</span>`;
  tapeInner.prepend(row);
}

document.getElementById('tapeToggle').addEventListener('click', () => {
  const tape  = document.getElementById('tape');
  const arrow = document.getElementById('tapeArrow');
  const isNowOpen = tape.classList.toggle('open');
  arrow.classList.toggle('open', isNowOpen);
});

function addRipple(btn, event) {
  const rect = btn.getBoundingClientRect();
  const x    = event ? event.clientX - rect.left : rect.width  / 2;
  const y    = event ? event.clientY - rect.top  : rect.height / 2;
  const span = document.createElement('span');
  span.className = 'ripple';
  const size = Math.max(rect.width, rect.height);
  span.style.cssText = `width:${size}px;height:${size}px;left:${x - size/2}px;top:${y - size/2}px`;
  btn.appendChild(span);
  span.addEventListener('animationend', () => span.remove());
}

function calculate(a, op, b) {
  if (op === '+') return a + b;
  if (op === '−') return a - b;
  if (op === '×') return a * b;
  if (op === '÷') {
    if (b === 0) return null;
    return a / b;
  }
  return b;
}

function handleDigit(val) {
  if (waiting) {
    current    = (val === '0') ? '0' : val;
    waiting    = false;
    hasDecimal = false;
  } else if (current === '0' && val !== '0') {
    current = val;
  } else if (current.replace(/\D/g, '').length >= 12) {
    return;
  } else {
    current += val;
  }
  showResult(current);
  animPop();
  if (stored !== null && operator) {
    showExpression(`${fmt(stored)} ${operator}`);
  }
}

function handleDot() {
  if (waiting) {
    current    = '0.';
    waiting    = false;
    hasDecimal = true;
    showResult(current);
    return;
  }
  if (hasDecimal) return;
  current   += '.';
  hasDecimal = true;
  showResult(current);
  animPop();
}

function handleOperator(val, btn) {
  const cur = parseFloat(current);

  if (stored !== null && waiting) {
    operator = val;
    showExpression(`${fmt(stored)} ${val}`);
    lightUp(btn);
    return;
  }

  if (stored !== null && operator !== null && !waiting) {
    const result = calculate(stored, operator, cur);
    if (result === null) { handleError("Can't ÷ by 0 😅"); return; }
    current    = fmt(result);
    hasDecimal = current.includes('.');
    stored     = parseFloat(current);
    showResult(current);
    animSlide();
  } else {
    stored = cur;
  }

  operator   = val;
  waiting    = true;
  hasDecimal = false;
  showExpression(`${fmt(stored)} ${val}`);
  lightUp(btn);
}

function handleEquals() {
  if (stored === null || operator === null) return;

  const b      = parseFloat(current);
  const result = calculate(stored, operator, b);

  if (result === null) { handleError("Can't ÷ by 0 😅"); return; }

  const expr = `${fmt(stored)} ${operator} ${fmt(b)}`;
  const ans  = fmt(result);

  addToHistory(expr, ans);

  current    = ans;
  hasDecimal = current.includes('.');
  stored     = null;
  operator   = null;
  waiting    = true;

  showResult(current, 'solved');
  showExpression(expr + ' =');
  lightUp(null);
  animSlide();

  showReaction(Math.abs(parseFloat(ans)) >= 1000);
}

function handleClear() {
  current    = '0';
  stored     = null;
  operator   = null;
  waiting    = false;
  hasDecimal = false;
  showResult('0');
  showExpression('');
  lightUp(null);
  animSlide();
}

function handleBackspace() {
  if (waiting) return;

  if (current.length <= 1 || (current.length === 2 && current[0] === '-')) {
    current    = '0';
    hasDecimal = false;
  } else {
    if (current.slice(-1) === '.') hasDecimal = false;
    current = current.slice(0, -1);
  }
  showResult(current);
  animPop();
}

function handleSign() {
  if (current === '0') return;
  current    = fmt(-parseFloat(current));
  hasDecimal = current.includes('.');
  showResult(current);
  animPop();
}

function handlePercent() {
  current    = fmt(parseFloat(current) / 100);
  hasDecimal = true;
  showResult(current);
  animPop();
}

function handleError(msg) {
  showResult(msg, 'error');
  showExpression('');
  lightUp(null);
  current    = '0';
  stored     = null;
  operator   = null;
  waiting    = false;
  hasDecimal = false;
}

document.getElementById('btnArea').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;

  addRipple(btn, e);

  const action = btn.dataset.action;
  const val    = btn.dataset.val;

  if      (action === 'digit')     handleDigit(val);
  else if (action === 'dot')       handleDot();
  else if (action === 'op')        handleOperator(val, btn);
  else if (action === 'equals')    handleEquals();
  else if (action === 'clear')     handleClear();
  else if (action === 'backspace') handleBackspace();
  else if (action === 'sign')      handleSign();
  else if (action === 'percent')   handlePercent();
});

document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') {
    handleDigit(e.key);
    return;
  }

  if (e.key === '.') { handleDot(); return; }

  const opMap = { '+': '+', '-': '−', '*': '×', '/': '÷' };
  if (opMap[e.key]) {
    e.preventDefault();
    const btn = document.querySelector(`[data-val="${opMap[e.key]}"]`);
    handleOperator(opMap[e.key], btn);
    return;
  }

  if (e.key === 'Enter' || e.key === '=') { handleEquals();  return; }
  if (e.key === 'Escape')                 { handleClear();   return; }
  if (e.key === 'Backspace') { e.preventDefault(); handleBackspace(); return; }
});
</script>
</body>
</html>
